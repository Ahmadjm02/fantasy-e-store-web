@if (loading()) {
  <div class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-[rgba(231,220,193,0.96)]">
    <div class="text-[9px] tracking-[3px] text-[var(--fs-muted)] mb-6">CONSULTING THE LEDGER</div>
    <div class="flex gap-3 items-center">
      <span class="block w-[9px] h-[9px] bg-[var(--fs-gold)]" style="animation:fs-pulse 1.2s ease-in-out infinite;animation-delay:0s"></span>
      <span class="block w-[9px] h-[9px] bg-[var(--fs-gold)]" style="animation:fs-pulse 1.2s ease-in-out infinite;animation-delay:.4s"></span>
      <span class="block w-[9px] h-[9px] bg-[var(--fs-gold)]" style="animation:fs-pulse 1.2s ease-in-out infinite;animation-delay:.8s"></span>
    </div>
  </div>
}
