@if (item()) {
  <div class="max-w-[1100px] mx-auto px-6 py-7 pb-14">
    <div
      class="inline-flex items-center gap-2 text-[9px] tracking-[1px] text-[var(--fs-muted)] mb-8 cursor-pointer hover:text-[var(--fs-oxblood)]"
      (click)="goStore()">
      ◄ STORE
      <span class="text-[var(--fs-gold)]">/</span>
      {{ item()!.location }}
      <span class="text-[var(--fs-gold)]">/</span>
      <span class="text-[var(--fs-oxblood)]">{{ item()!.title.toUpperCase() }}</span>
    </div>
    <div
      class="grid items-start gap-[40px]"
      [style.grid-template-columns]="isMobile() ? '1fr' : 'minmax(260px, 380px) 1fr'">
      <div
        class="relative border border-[rgba(43,35,22,.22)]"
        style="aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#d8c9a6 0 16px,#d2c29c 16px 32px)">
        <div class="absolute inset-2 border border-[rgba(154,115,48,.2)] pointer-events-none"></div>
        <img [src]="getImage()" [alt]="item()!.title" class="absolute inset-0 w-full h-full object-contain p-24">
      </div>
      <div class="flex flex-col gap-6">
        <div>
          <h1 class="text-[28px] font-bold m-0 mb-5 leading-tight text-[var(--fs-ink)]">{{ item()!.title.toUpperCase() }}</h1>
          <div class="flex items-center gap-3 mb-6">
            <div class="h-px flex-1 bg-gradient-to-r from-[var(--fs-gold)] to-transparent"></div>
            <span class="text-[var(--fs-gold)] text-[10px]">✦</span>
          </div>
          <p class="text-[9px] leading-loose text-[var(--fs-muted)] m-0 tracking-[.4px]">{{ item()!.description }}</p>
        </div>
        <div>
          <div class="flex items-end justify-between pb-5 border-b border-[rgba(43,35,22,.15)] mb-4">
            <div>
              <div class="text-[7px] tracking-[1.5px] text-[var(--fs-very-muted)] mb-2">BEARER'S PRICE</div>
              <div class="text-[28px] text-[var(--fs-oxblood)] leading-none">{{ item()!.price | itemPrice: item()!.location }}</div>
            </div>
            <div class="text-right">
              <div class="text-[7px] tracking-[1.5px] text-[var(--fs-very-muted)] mb-2">LOCATION</div>
              <div class="text-[12px] text-[var(--fs-ink)]">{{ item()!.location === 'JO' ? '🇯🇴 Jordan' : '🇸🇦 Saudi Arabia' }}</div>
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <button
              class="w-full bg-[var(--fs-forest)] text-[#efe7d2] border-none py-4 text-[11px] tracking-[2px] cursor-pointer hover:bg-[var(--fs-forest-hover)]"
              (click)="buy()">STRIKE THE BARGAIN ►</button>
            <app-confirm-dialog
              [item]="item()!"
              [visible]="confirmVisible()"
              [loading]="loading()"
              (confirm)="confirmBuy()"
              (cancel)="cancelBuy()" />
            <button
              class="w-full bg-transparent text-[var(--fs-muted)] border border-[rgba(43,35,22,.22)] py-3 text-[8px] tracking-[1.5px] cursor-pointer hover:bg-[rgba(43,35,22,.04)]"
              (click)="goStore()">◄ BACK TO STORE</button>
          </div>
        </div>
      </div>
    </div>
  </div>
}
